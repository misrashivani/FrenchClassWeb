<section id="french-quote" class="quote-section scrollto clearfix">
  <div class="row clearfix">
    <div class="col-1 text-center">
      <div class="quote-box">
        <div class="quote-mark">“</div>

        <p class="quote-line" [ngClass]="fadeClass">
          {{ displayedQuote }}
        </p>

        <p class="quote-author">— SayItOutInFrench</p>
      </div>
    </div>
  </div>
</section>
